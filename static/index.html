<!DOCTYPE html>
{% raw %}
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AirLink ATC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-void:#030712;--bg-panel:#080f1c;--bg-card:#0f2035;
  --cyan:#00e5ff;--cyan-dim:#00b8cc;--cyan-glow:rgba(0,229,255,0.15);
  --red:#ff3d57;--green:#00e676;--amber:#ffb300;
  --border:#1a3a5c;--border-bright:#00e5ff44;
  --text-primary:#e0f7ff;--text-secondary:#5a8aaa;--text-dim:#2a4a6a;
  --font-mono:"Share Tech Mono",monospace;--font-ui:"Rajdhani",sans-serif;
  --sidebar-w:320px;
}
html,body,#root{width:100%;height:100%;background:var(--bg-void);overflow:hidden;}
body{font-family:var(--font-ui);}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:9999;}
#map-container{position:absolute;inset:0;}
#map{width:100%;height:100%;}
.leaflet-control-attribution{display:none!important;}
.leaflet-control-zoom a{background:var(--bg-panel)!important;color:var(--cyan)!important;border-color:var(--border)!important;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,rgba(3,7,18,0.98),rgba(8,15,28,0.92));border-bottom:1px solid var(--border-bright);display:flex;align-items:center;padding:0 20px;gap:18px;z-index:1000;backdrop-filter:blur(12px);}
.logo{font-size:22px;font-weight:700;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.logo-pulse{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 2s ease-in-out infinite;}
.logo-sub{font-size:10px;font-weight:400;letter-spacing:6px;color:var(--text-secondary);align-self:flex-end;margin-bottom:4px;}
.tb-div{width:1px;height:30px;background:var(--border);}
.tb-stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
.tb-val{font-family:var(--font-mono);font-size:15px;color:var(--cyan);}
.tb-lbl{font-size:9px;letter-spacing:2px;color:var(--text-secondary);text-transform:uppercase;}
.tb-time{margin-left:auto;font-family:var(--font-mono);font-size:17px;color:var(--cyan);letter-spacing:2px;}
.tb-badge{display:flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid;border-radius:3px;font-size:11px;letter-spacing:1.5px;font-weight:600;font-family:var(--font-mono);}
.badge-safe{border-color:var(--green);color:var(--green);}
.badge-conflict{border-color:var(--amber);color:var(--amber);animation:blink 1.2s step-end infinite;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* SIDEBAR */
.sidebar{position:fixed;top:56px;right:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(180deg,rgba(8,15,28,0.97),rgba(3,7,18,0.96));border-left:1px solid var(--border-bright);display:flex;flex-direction:column;z-index:900;backdrop-filter:blur(16px);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.sidebar.collapsed{transform:translateX(var(--sidebar-w));}
.sb-toggle{position:fixed;top:50%;width:28px;height:64px;z-index:950;background:rgba(8,15,28,0.97);border:1px solid var(--border-bright);border-right:none;border-radius:6px 0 0 6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--cyan);font-size:13px;transform:translateY(-50%);transition:right 0.3s cubic-bezier(0.4,0,0.2,1);}
.sb-toggle:hover{background:var(--cyan-glow);}
.sb-sec{padding:14px 16px;border-bottom:1px solid var(--border);}
.sec-hdr{font-size:9px;letter-spacing:3px;color:var(--text-secondary);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sec-hdr::after{content:"";flex:1;height:1px;background:var(--border);}

/* DRONE CARD */
.drone-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.drone-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--dc,var(--cyan));}
.drone-card:hover{border-color:var(--border-bright);}
.dc-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dc-img{width:26px;height:26px;object-fit:contain;opacity:0.9;}
.dc-id{font-family:var(--font-mono);font-size:11px;color:var(--dc,var(--cyan));background:rgba(0,229,255,0.08);padding:2px 6px;border-radius:3px;border:1px solid var(--dc,var(--cyan));letter-spacing:1px;}
.dc-name{font-size:13px;font-weight:600;letter-spacing:1px;color:var(--text-primary);}
.dc-alt{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:3px;border:1px solid var(--border);}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;line-height:1;transition:color 0.2s;padding:2px 4px;margin-left:4px;}
.rm-btn:hover{color:var(--red);}
.f-lbl{font-size:9px;letter-spacing:1.5px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px;}
.f-inp{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:3px;padding:7px 10px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color 0.2s;margin-bottom:8px;}
.f-inp:focus{border-color:var(--cyan);background:rgba(0,229,255,0.04);}
.f-inp::placeholder{color:var(--text-dim);}
.add-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border-bright);border-radius:3px;color:var(--cyan);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.add-btn:hover{background:var(--cyan-glow);border-style:solid;}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}
.btn{padding:11px;border:1px solid;border-radius:3px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;width:100%;font-family:var(--font-ui);}
.btn-primary{background:var(--cyan);color:#000;border-color:var(--cyan);}
.btn-primary:hover{background:var(--cyan-dim);box-shadow:0 0 20px rgba(0,229,255,0.3);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:var(--border);}
.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.sb-scroll{flex:1;overflow-y:auto;padding:10px 12px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);}

/* CONFLICT PANEL */
.conflict-panel{position:fixed;top:72px;left:16px;width:270px;background:rgba(8,15,28,0.95);border:1px solid var(--border-bright);border-radius:4px;z-index:900;backdrop-filter:blur(16px);overflow:hidden;}
.cp-title{padding:10px 14px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:3px;color:var(--text-secondary);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.cp-row{padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;}
.cp-row:last-child{border-bottom:none;}
.cp-drones{font-family:var(--font-mono);color:var(--amber);margin-bottom:3px;font-size:11px;}
.cp-resolve{color:var(--text-secondary);font-size:10px;line-height:1.4;}
.cp-empty{padding:10px 14px;font-family:var(--font-mono);font-size:11px;color:var(--green);}

/* TELEMETRY */
.telem-panel{position:fixed;bottom:20px;left:16px;width:270px;background:rgba(8,15,28,0.95);border:1px solid var(--border-bright);border-radius:4px;z-index:900;backdrop-filter:blur(16px);overflow:hidden;}
.tp-title{padding:10px 14px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:3px;color:var(--text-secondary);text-transform:uppercase;}
.tp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);}
.tp-row:last-child{border-bottom:none;}
.tp-lbl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-secondary);}
.tp-pip{width:7px;height:7px;border-radius:50%;}
.tp-val{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(3,7,18,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px);}
.radar-ring{width:80px;height:80px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--cyan);animation:spin 1s linear infinite;margin-bottom:20px;}
.loading-text{font-family:var(--font-mono);font-size:13px;color:var(--cyan);letter-spacing:3px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:3px;font-family:var(--font-mono);font-size:12px;letter-spacing:1px;z-index:3000;border:1px solid;animation:fadeUp 0.3s ease;}
.toast-success{background:rgba(0,230,118,0.15);color:var(--green);border-color:var(--green);}
.toast-error{background:rgba(255,61,87,0.15);color:var(--red);border-color:var(--red);}
.ch-h,.ch-v{position:fixed;background:rgba(0,229,255,0.06);pointer-events:none;z-index:500;}
.ch-h{height:1px;left:0;right:0;top:50%;}
.ch-v{width:1px;left:50%;top:56px;bottom:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const COLORS=["#00e5ff","#ffb300","#00e676","#ff6d00","#ea80fc","#69f0ae","#ff3d57","#40c4ff"];
const HUE_ROTATIONS=[180,40,130,25,280,140,350,200];
const BLR=[12.9716,77.5946];
const DRONE_SRC=window.DRONE_IMG;

// Canvas-color drone icon for map markers
const makeDroneIcon=color=>new Promise(resolve=>{
  const canvas=document.createElement("canvas");
  canvas.width=40;canvas.height=40;
  const ctx=canvas.getContext("2d");
  const img=new Image();
  img.src=DRONE_SRC;
  img.onload=()=>{
    ctx.drawImage(img,0,0,40,40);
    ctx.globalCompositeOperation="source-in";
    ctx.fillStyle=color;
    ctx.fillRect(0,0,40,40);
    resolve(L.divIcon({
      html:`<img src="${canvas.toDataURL()}" style="width:34px;height:34px;object-fit:contain;transform:translate(-50%,-50%);filter:drop-shadow(0 0 5px ${color}99)"/>`,
      className:"",iconSize:[0,0],iconAnchor:[0,0]
    }));
  };
  img.onerror=()=>resolve(null);
});

function App(){
  const mapEl=useRef(null);
  const mapRef=useRef(null);
  const layersRef=useRef([]);
  const [drones,setDrones]=useState([{id:1,from:"",to:""}]);
  const [nextId,setNextId]=useState(2);
  const [loading,setLoading]=useState(false);
  const [telemetry,setTelemetry]=useState(null);
  const [conflicts,setConflicts]=useState(null);
  const [toast,setToast]=useState(null);
  const [time,setTime]=useState("");
  const [collapsed,setCollapsed]=useState(false);
  const [altitudes,setAltitudes]=useState([]);

  useEffect(()=>{
    if(mapRef.current)return;
    const m=L.map(mapEl.current,{zoomControl:false,attributionControl:false}).setView(BLR,11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(m);
    L.control.zoom({position:"bottomright"}).addTo(m);
    mapRef.current=m;
  },[]);

  useEffect(()=>{
    const upd=()=>{const n=new Date(),p=x=>String(x).padStart(2,"0");setTime(`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())} IST`);};
    upd();const id=setInterval(upd,1000);return()=>clearInterval(id);
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),4000);};
  const clearLayers=()=>{layersRef.current.forEach(l=>{try{mapRef.current.removeLayer(l);}catch(e){}});layersRef.current=[];};
  const addDrone=()=>{setDrones(d=>[...d,{id:nextId,from:"",to:""}]);setNextId(n=>n+1);};
  const rmDrone=id=>setDrones(d=>d.filter(x=>x.id!==id));
  const updDrone=(id,f,v)=>setDrones(d=>d.map(x=>x.id===id?{...x,[f]:v}:x));

  const haversine=(a,b)=>{
    const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
    const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
  };

  const animateDrone=async(path,color,ls)=>{
    const icon=await makeDroneIcon(color);
    if(!icon)return;
    const mk=L.marker(path[0],{icon}).addTo(mapRef.current);
    ls.push(mk);
    let seg=0,prog=0,last=null;
    const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
    const step=ts=>{
      if(!last)last=ts;
      prog+=(ts-last)/1200;last=ts;
      if(prog>=1){prog=0;seg++;if(seg>=path.length-1){mk.setLatLng(path[path.length-1]);return;}}
      mk.setLatLng(lerp(path[seg],path[seg+1],prog));
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  };

  const predict=async()=>{
    for(const d of drones){
      if(!d.from.trim()||!d.to.trim()){showToast("Fill all origin & destination fields","error");return;}
    }
    setLoading(true);clearLayers();setTelemetry(null);setConflicts(null);setAltitudes([]);
    const ls=[];
    try{
      // Call the real Flask ML backend
      const res=await fetch("/predict_paths",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({drones:drones.map(d=>({from:d.from,to:d.to}))})
      });
      const data=await res.json();
      if(data.error){showToast(data.error,"error");return;}

      setAltitudes(data.altitudes||[]);
      setConflicts(data.conflicts||[]);

      const rows=[];
      data.paths.forEach((path,i)=>{
        const d=drones[i];
        const color=COLORS[i%COLORS.length];
        const latlngs=path.map(([lat,lon])=>[lat,lon]);
        let dist=0;
        for(let k=1;k<latlngs.length;k++)dist+=haversine(latlngs[k-1],latlngs[k]);
        rows.push({id:d.id,from:d.from,to:d.to,dist:dist.toFixed(1),alt:data.altitudes?data.altitudes[i]:"-",color});

        // Dashed flight path polyline
        const poly=L.polyline(latlngs,{color,weight:2.5,opacity:0.85,dashArray:"8,5"}).addTo(mapRef.current);
        ls.push(poly);

        // Origin chip
        const sm=L.divIcon({html:`<div style="background:${color};color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;font-family:monospace;white-space:nowrap;box-shadow:0 2px 6px ${color}66">▶ ${d.from}</div>`,className:"",iconSize:"auto"});
        ls.push(L.marker(latlngs[0],{icon:sm}).addTo(mapRef.current));

        // Destination chip
        const em=L.divIcon({html:`<div style="background:#0d1a2e;color:${color};border:1px solid ${color};font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;font-family:monospace;white-space:nowrap">■ ${d.to}</div>`,className:"",iconSize:"auto"});
        ls.push(L.marker(latlngs[latlngs.length-1],{icon:em}).addTo(mapRef.current));

        animateDrone(latlngs,color,ls);
        if(i===0)mapRef.current.fitBounds(poly.getBounds(),{padding:[80,80]});
      });

      layersRef.current=ls;
      setTelemetry(rows);
      const cCount=data.conflicts_detected||0;
      showToast(cCount>0?`${cCount} conflict(s) detected & resolved by ML`:`${drones.length} safe path(s) computed — no conflicts`,"success");
    }catch(e){
      showToast("Cannot reach Flask backend — run app.py first","error");
    }finally{setLoading(false);}
  };

  const clearAll=()=>{
    clearLayers();setTelemetry(null);setConflicts(null);setAltitudes([]);
    setDrones([{id:1,from:"",to:""},{id:2,from:"",to:""}]);setNextId(3);
    showToast("Airspace cleared","success");
  };

  const hasConflicts=conflicts&&conflicts.length>0;

  return(
    <>
      <div id="map-container" ref={mapEl}/>
      <div className="ch-h"/><div className="ch-v"/>

      {/* TOPBAR */}
      <div className="topbar">
        <div className="logo">
          <div className="logo-pulse"/>AIRLINK<span className="logo-sub">ATC</span>
        </div>
        <div className="tb-div"/>
        <div className="tb-stat">
          <span className="tb-val">{drones.length}</span>
          <span className="tb-lbl">UAVs</span>
        </div>
        <div className="tb-div"/>
        <div className="tb-stat">
          <span className="tb-val" style={{color:altitudes.length?["var(--cyan)","var(--amber)","var(--green)"][Math.min(altitudes.length-1,2)]:"var(--cyan)"}}>{altitudes.length?`${altitudes[0]}m+`:"—"}</span>
          <span className="tb-lbl">Alt. Base</span>
        </div>
        <div className="tb-div"/>
        <div className={`tb-badge ${hasConflicts?"badge-conflict":"badge-safe"}`}>
          <div className="badge-dot"/>
          {hasConflicts?`${conflicts.length} RESOLVED`:"AIRSPACE CLEAR"}
        </div>
        <div className="tb-time">{time}</div>
      </div>

      {/* SIDEBAR */}
      <div className={`sidebar${collapsed?" collapsed":""}`}>
        <div className="sb-sec"><div className="sec-hdr">Active UAVs</div></div>
        <div className="sb-scroll">
          {drones.map((d,i)=>{
            const color=COLORS[i%COLORS.length];
            const alt=altitudes[i]?`${altitudes[i]}m`:"auto";
            return(
              <div className="drone-card" key={d.id} style={{"--dc":color}}>
                <div className="dc-hdr">
                  <img src={DRONE_SRC} className="dc-img" alt="drone"
                    style={{filter:`invert(1) sepia(1) saturate(5) hue-rotate(${HUE_ROTATIONS[i%8]}deg)`}}/>
                  <span className="dc-id">UAV-{String(d.id).padStart(3,"0")}</span>
                  <span className="dc-name">Drone {d.id}</span>
                  <span className="dc-alt">{alt}</span>
                  {drones.length>2&&<button className="rm-btn" onClick={()=>rmDrone(d.id)}>×</button>}
                </div>
                <div className="f-lbl">Origin</div>
                <input className="f-inp" placeholder="e.g. Indiranagar" value={d.from} onChange={e=>updDrone(d.id,"from",e.target.value)}/>
                <div className="f-lbl">Destination</div>
                <input className="f-inp" placeholder="e.g. Electronic City" value={d.to} onChange={e=>updDrone(d.id,"to",e.target.value)}/>
              </div>
            );
          })}
          <button className="add-btn" onClick={addDrone}>
            <img src={DRONE_SRC} style={{width:16,height:16,filter:"invert(1) sepia(1) saturate(5) hue-rotate(180deg)",opacity:0.9}} alt=""/>
            ADD UAV
          </button>
        </div>
        <div className="action-row">
          <button className="btn btn-primary" onClick={predict} disabled={loading}>{loading?"COMPUTING...":"PREDICT PATHS"}</button>
          <button className="btn btn-ghost" onClick={clearAll}>CLEAR</button>
        </div>
      </div>

      {/* SIDEBAR TOGGLE */}
      <div className="sb-toggle" style={{right:collapsed?0:"var(--sidebar-w)"}} onClick={()=>setCollapsed(c=>!c)}>
        {collapsed?"◀":"▶"}
      </div>

      {/* CONFLICT PANEL — only shown after prediction */}
      {conflicts!==null&&(
        <div className="conflict-panel">
          <div className="cp-title">
            <div className="badge-dot" style={{background:hasConflicts?"var(--amber)":"var(--green)",width:6,height:6,borderRadius:"50%"}}/>
            ML Conflict Report
          </div>
          {hasConflicts
            ? conflicts.map((c,i)=>(
                <div className="cp-row" key={i}>
                  <div className="cp-drones">UAV-{String(c.drone_a+1).padStart(3,"0")} ↔ UAV-{String(c.drone_b+1).padStart(3,"0")}</div>
                  <div className="cp-resolve">{c.resolved_by}</div>
                </div>
              ))
            : <div className="cp-empty">✓ No conflicts — all paths safe</div>
          }
        </div>
      )}

      {/* TELEMETRY PANEL */}
      {telemetry&&(
        <div className="telem-panel">
          <div className="tp-title">Flight Telemetry</div>
          {telemetry.map(s=>(
            <div className="tp-row" key={s.id}>
              <div className="tp-lbl">
                <div className="tp-pip" style={{background:s.color}}/>
                UAV-{String(s.id).padStart(3,"0")}
              </div>
              <div className="tp-val">{s.dist} km · {s.alt}m alt</div>
            </div>
          ))}
        </div>
      )}

      {loading&&(
        <div className="loading-overlay">
          <div className="radar-ring"/>
          <div className="loading-text">ML COMPUTING SAFE PATHS...</div>
        </div>
      )}
      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
{% endraw %}
</html>
